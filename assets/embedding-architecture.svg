<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Embedding Model Architecture</title>
  <desc id="desc">Sequence branch and context branch fused by add or gate, followed by classifier for next city prediction.</desc>
  <defs>
    <style>
      .title { font: 700 40px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px Arial, sans-serif; fill: #334155; }
      .label { font: 600 19px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 16px Arial, sans-serif; fill: #334155; }
      .box { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.2; rx: 14; ry: 14; }
      .box2 { fill: #f8fafc; stroke: #64748b; stroke-width: 2.2; rx: 14; ry: 14; }
      .box3 { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2.2; rx: 14; ry: 14; }
      .arrow { stroke: #334155; stroke-width: 2.8; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#334155" />
    </marker>
  </defs>

  <text x="800" y="70" text-anchor="middle" class="title">Embedding Model Architecture</text>
  <text x="800" y="104" text-anchor="middle" class="subtitle">Transformer/GRU + Context/Semantic Features + Add/Gate Fusion</text>

  <!-- Sequence branch -->
  <rect x="90" y="180" width="250" height="82" class="box" />
  <text x="215" y="226" text-anchor="middle" class="label">City Prefix Tokens</text>

  <rect x="390" y="180" width="250" height="82" class="box" />
  <text x="515" y="226" text-anchor="middle" class="label">City Embedding</text>

  <rect x="690" y="160" width="305" height="122" class="box" />
  <text x="842" y="206" text-anchor="middle" class="label">Sequence Encoder</text>
  <text x="842" y="236" text-anchor="middle" class="small">Transformer or GRU</text>

  <rect x="1045" y="180" width="260" height="82" class="box" />
  <text x="1175" y="226" text-anchor="middle" class="label">Sequence Hidden State</text>

  <line x1="340" y1="221" x2="390" y2="221" class="arrow" />
  <line x1="640" y1="221" x2="690" y2="221" class="arrow" />
  <line x1="995" y1="221" x2="1045" y2="221" class="arrow" />

  <!-- Context inputs -->
  <rect x="120" y="430" width="280" height="86" class="box2" />
  <text x="260" y="470" text-anchor="middle" class="label">Trip Context Features</text>
  <text x="260" y="497" text-anchor="middle" class="small">booker, device, affiliate, month, stay, ...</text>

  <rect x="450" y="430" width="280" height="86" class="box2" />
  <text x="590" y="470" text-anchor="middle" class="label">Geography Features</text>
  <text x="590" y="497" text-anchor="middle" class="small">last_country, cross_border stats</text>

  <rect x="780" y="430" width="300" height="86" class="box2" />
  <text x="930" y="470" text-anchor="middle" class="label">Semantic IDs</text>
  <text x="930" y="497" text-anchor="middle" class="small">code1, code2 from RQVAE or RQKMeans</text>

  <rect x="1140" y="420" width="300" height="106" class="box3" />
  <text x="1290" y="467" text-anchor="middle" class="label">Feature Embeddings + Concat</text>
  <text x="1290" y="497" text-anchor="middle" class="small">dense context representation</text>

  <rect x="1140" y="570" width="300" height="86" class="box3" />
  <text x="1290" y="618" text-anchor="middle" class="label">Context Projection</text>

  <line x1="400" y1="473" x2="1140" y2="473" class="arrow" />
  <line x1="730" y1="473" x2="1140" y2="473" class="arrow" />
  <line x1="1080" y1="473" x2="1140" y2="473" class="arrow" />
  <line x1="1290" y1="526" x2="1290" y2="570" class="arrow" />

  <!-- Fusion and output -->
  <rect x="760" y="640" width="300" height="110" class="box" />
  <text x="910" y="683" text-anchor="middle" class="label">Fusion</text>
  <text x="910" y="714" text-anchor="middle" class="small">add: seq + ctx</text>
  <text x="910" y="737" text-anchor="middle" class="small">gate: seq + gate * ctx</text>

  <rect x="470" y="640" width="230" height="110" class="box2" />
  <text x="585" y="690" text-anchor="middle" class="label">Classifier</text>
  <text x="585" y="718" text-anchor="middle" class="small">over city vocabulary</text>

  <rect x="150" y="652" width="250" height="86" class="box2" />
  <text x="275" y="700" text-anchor="middle" class="label">Next City Prediction</text>

  <line x1="1045" y1="262" x2="958" y2="640" class="arrow dashed" />
  <line x1="1140" y1="613" x2="1060" y2="668" class="arrow" />
  <line x1="760" y1="695" x2="700" y2="695" class="arrow" />
  <line x1="470" y1="695" x2="400" y2="695" class="arrow" />
</svg>
